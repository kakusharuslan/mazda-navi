<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="apple-mobile-web-app-capable" content="yes"><title>Mazda Navi Card</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px}.logo-line{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}.logo-icon{width:36px;height:36px;background:#c8a84b;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000}h1{font-size:22px;font-weight:700;color:#f0f0f0}.subtitle{font-size:13px;color:#888;margin-top:4px;text-align:center;margin-bottom:32px}.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:24px;width:100%;max-width:480px}label{display:block;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}.input-row{display:flex;gap:10px}input{flex:1;background:#0f0f0f;border:1.5px solid #2a2a2a;border-radius:10px;color:#f0f0f0;font-size:15px;font-weight:500;letter-spacing:1px;padding:14px 16px;outline:none;text-transform:uppercase}input:focus{border-color:#c8a84b}button{background:#c8a84b;color:#000;border:none;border-radius:10px;font-size:15px;font-weight:700;padding:14px 20px;cursor:pointer}.result{margin-top:20px;border-radius:12px;padding:18px;display:none}.result.show{display:block}.result.success{background:rgba(76,175,114,.1);border:1px solid rgba(76,175,114,.25)}.result.error{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.25)}.result-model{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}.result-model span{color:#c8a84b}.result-card{font-size:24px;font-weight:700;color:#4caf72;letter-spacing:.5px;margin-bottom:4px}.result-card-label{font-size:12px;color:#888;margin-bottom:4px}.result-card-alt{font-size:13px;color:#888}.result-card-alt span{color:#aaa}.result-error-text{font-size:15px;color:#e05252;font-weight:500}.table-hint{margin-top:24px;width:100%;max-width:480px}.table-hint-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding:0 4px}.table-scroll{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;overflow:hidden}table{width:100%;border-collapse:collapse;font-size:11px}th{background:#222;color:#c8a84b;font-weight:600;padding:10px 8px;text-align:center;border-bottom:1px solid #2a2a2a;font-size:10px}th:first-child{text-align:left;padding-left:12px}td{padding:9px 8px;text-align:center;border-bottom:1px solid #1f1f1f;color:#888;font-size:11px}td:first-child{text-align:left;padding-left:12px;color:#f0f0f0;font-weight:500;line-height:1.4}tr:last-child td{border-bottom:none}.check{color:#4caf72;font-size:14px}tr.highlight-row td{background:rgba(200,168,75,.12)}tr.highlight-row td:first-child{color:#c8a84b}</style></head><body><div class="logo-line"><div class="logo-icon">M</div><h1>Mazda Navi Card</h1></div><p class="subtitle">Визначення SD-карти навігації по VIN (Європа)</p><div class="card"><label for="vin">VIN-код автомобіля</label><div class="input-row"><input type="text" id="vin" placeholder="JMZKEGWLA90452297" maxlength="17" autocomplete="off" autocorrect="off" spellcheck="false"><button onclick="findCard()">Знайти</button></div><div class="result" id="result"></div></div><div class="table-hint"><div class="table-hint-title">Таблиця відповідності</div><div class="table-scroll"><table><thead><tr><th>Модель / VIN</th><th>BJM7/KGSE</th><th>BDMC/BDNP</th><th>DN4J/DN4N</th><th>KAAA/KSOG</th><th>BJGB</th></tr></thead><tbody id="tableBody"></tbody></table></div></div><script>const DB=[{id:0,label:"Всі моделі Connect (8″)",card_eu:"BJM7-66-EZ1",card_cy:"KGSE-66-EZ1",col:0,match:(m,s)=>m==="UNIVERSAL_8"},{id:1,label:"Mazda3 (BP) VIN <299999",card_eu:"BDMC-66-EZ1",card_cy:"BDNP-66-EZ1",col:1,match:(m,s)=>m==="MAZDA3_BP"&&s<300000},{id:2,label:"CX-30 (DM) VIN <299999",card_eu:"BDMC-66-EZ1",card_cy:"BDNP-66-EZ1",col:1,match:(m,s)=>m==="CX30_DM"&&s<300000},{id:3,label:"MX-30 (DR)",card_eu:"DN4J-66-EZ1",card_cy:"DN4N-66-EZ1",col:2,match:(m,s)=>m==="MX30_DR"},{id:4,label:"Mazda3 (BP) VIN 300000–399999",card_eu:"DN4J-66-EZ1",card_cy:"DN4N-66-EZ1",col:2,match:(m,s)=>m==="MAZDA3_BP"&&s>=300000&&s<=399999},{id:5,label:"CX-30 (DM) VIN 300000–399999",card_eu:"DN4J-66-EZ1",card_cy:"DN4N-66-EZ1",col:2,match:(m,s)=>m==="CX30_DM"&&s>=300000&&s<=399999},{id:6,label:"CX-5 (KF) Connect2 VIN <350001",card_eu:"DN4J-66-EZ1",card_cy:"DN4N-66-EZ1",col:2,match:(m,s)=>m==="CX5_KF"&&s<350001},{id:7,label:"CX-5 (KF) Connect2 VIN 350001–599999",card_eu:"KAAA-66-EZ1",card_cy:"KSOG-66-EZ1",col:3,match:(m,s)=>m==="CX5_KF"&&s>=350001&&s<=599999},{id:8,label:"CX-60 (KH) VIN 100001–249999",card_eu:"KAAA-66-EZ1",card_cy:"KSOG-66-EZ1",col:3,match:(m,s)=>m==="CX60_KH"&&s>=100001&&s<=249999},{id:9,label:"CX-60 (KH) VIN >250000",card_eu:"BJGB-66-EZ1",card_cy:"BJGB-66-EZ1",col:4,match:(m,s)=>m==="CX60_KH"&&s>250000},{id:10,label:"Mazda3 BR (BP >400000)",card_eu:"BJGB-66-EZ1",card_cy:"BJGB-66-EZ1",col:4,match:(m,s)=>m==="MAZDA3_BR"&&s>400000},{id:11,label:"CX-30 DT (DM >400000)",card_eu:"BJGB-66-EZ1",card_cy:"BJGB-66-EZ1",col:4,match:(m,s)=>m==="CX30_DT"&&s>400000},{id:12,label:"MX-5 (ND) VIN >700000",card_eu:"BJGB-66-EZ1",card_cy:"BJGB-66-EZ1",col:4,match:(m,s)=>m==="MX5_ND"&&s>700000},{id:13,label:"CX-80 (KL)",card_eu:"BJGB-66-EZ1",card_cy:"BJGB-66-EZ1",col:4,match:(m,s)=>m==="CX80_KL"},{id:14,label:"CX-90 (KK)",card_eu:"KAAA-66-EZ1",card_cy:"KSOG-66-EZ1",col:3,match:(m,s)=>m==="CX90_KK"}];function decodeVin(vin){vin=vin.trim().toUpperCase();if(vin.length!==17)return null;const wmi=vin.substring(0,3);if(!["JMZ","JM7","JM1","JM0"].includes(wmi))return{error:"Не Mazda (WMI: "+wmi+")"};const c45=vin.substring(3,5);const seq=parseInt(vin.substring(11,17));const map={"KE":["CX5_KF","CX-5 (KF)"],"KF":["CX5_KF","CX-5 (KF)"],"KG":["CX5_KF","CX-5 (KF)"],"DM":seq>400000?["CX30_DT","CX-30 DT"]:["CX30_DM","CX-30 (DM)"],"DR":["MX30_DR","MX-30 (DR)"],"KH":["CX60_KH","CX-60 (KH)"],"KL":["CX80_KL","CX-80 (KL)"],"KK":["CX90_KK","CX-90 (KK)"],"BP":seq>400000?["MAZDA3_BR","Mazda3 BR"]:["MAZDA3_BP","Mazda3 (BP)"],"ND":["MX5_ND","MX-5 (ND)"]};const r=map[c45];if(!r)return{error:"Модель не визначена. Код: "+c45};return{model:r[0],modelName:r[1],seq}}function findCard(){const v=document.getElementById("vin").value;const el=document.getElementById("result");el.className="result";if(!v){showError("Введіть VIN");return}const d=decodeVin(v);if(!d){showError("VIN має бути 17 символів");return}if(d.error){showError(d.error);return}let match=null;for(const r of DB){if(r.match(d.model,d.seq)){match=r;break}}if(!match){showError(d.modelName+" seq:"+d.seq+" — не знайдено");return}highlightRow(match.id);el.innerHTML=`<div class="result-model">Модель: <span>${d.modelName}</span> · seq: ${d.seq}</div><div class="result-card-label">SD-карта (ЄС):</div><div class="result-card">${match.card_eu}</div>${match.card_eu!==match.card_cy?`<div class="result-card-alt">Кіпр: <span>${match.card_cy}</span></div>`:""}`; el.className="result success show"}function showError(msg){const el=document.getElementById("result");el.innerHTML=`<div class="result-error-text">⚠ ${msg}</div>`;el.className="result error show";clearHighlight()}function highlightRow(id){clearHighlight();document.querySelectorAll("#tableBody tr").forEach(r=>{if(parseInt(r.dataset.id)===id)r.classList.add("highlight-row")})}function clearHighlight(){document.querySelectorAll("#tableBody tr").forEach(r=>r.classList.remove("highlight-row"))}function buildTable(){const tbody=document.getElementById("tableBody");DB.forEach(rule=>{const tr=document.createElement("tr");tr.dataset.id=rule.id;const cells=["","","","",""];cells[rule.col]=`<span class="check">✓</span>`;tr.innerHTML=`<td>${rule.label}</td>${cells.map(c=>`<td>${c||"–"}</td>`).join("")}`;tbody.appendChild(tr)})}buildTable();document.getElementById("vin").addEventListener("keydown",e=>{if(e.key==="Enter")findCard()});</script></body></html>
